name: Build ExileForge Database

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * *"

permissions:
  contents: write

concurrency:
  group: exileforge-database
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ExileForge herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: RePoE-Daten importieren
        run: node tools/import-repoe-database.mjs

      - name: PoE2DB-App-Adapter erzeugen
        run: |
          node tools/build-poe2db-app-adapter.mjs
          node tools/build-poe2db-affix-groups.mjs

      - name: Daten prüfen
        run: |
          node tools/validate-poe2db-app.mjs
          test -f generated/repoe/manifest.json
          test -f generated/poe2db/app/manifest.json
          test -f generated/poe2db/app/bases.json
          test -f generated/poe2db/app/mods.json
          test -f generated/poe2db/app/index.json
          test -d generated/poe2db/app/pools

          find generated/poe2db/app -type f -size +99M -print -quit | \
            grep -q . && {
              echo "Mindestens eine erzeugte Datei ist größer als 99 MB."
              exit 1
            } || true

      - name: Daten speichern
        run: |
          git config user.name "ExileForge Data Bot"
          git config user.email "actions@users.noreply.github.com"

          git add -f generated/repoe generated/app-v2 generated/poe2db/app

          if git diff --cached --quiet; then
            echo "Keine Änderungen gefunden."
            exit 0
          fi

          git commit -m "ExileForge-Datenbank aktualisieren"
          git push
