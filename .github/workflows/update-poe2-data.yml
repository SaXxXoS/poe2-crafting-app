name: Update PoE2 Database

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: ExileForge herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Aktuelle PoE2-Rohdaten herunterladen
        run: |
          rm -rf .cache/poe2-data
          mkdir -p .cache
          git clone --depth 1 https://github.com/LocalIdentity/poe2-data.git .cache/poe2-data

      - name: Path of Building 2 herunterladen
        run: |
          rm -rf .cache/pob2
          git clone --depth 1 --branch dev https://github.com/PathOfBuildingCommunity/PathOfBuilding-PoE2.git .cache/pob2

      - name: Rohdaten importieren
        run: node tools/import-poe2-data.mjs .cache/poe2-data

      - name: Rohdaten prüfen
        run: node tools/validate-poe2-data.mjs

      - name: Bestehende App-Daten erzeugen
        run: node tools/build-app-data.mjs

      - name: PoB-Basen übernehmen
        run: node tools/import-pob-bases.mjs .cache/pob2

      - name: Neue Daten speichern
        run: |
          git config user.name "ExileForge Data Bot"
          git config user.email "actions@users.noreply.github.com"

          git add -f generated data.js style.css

          if git diff --cached --quiet; then
            echo "Keine Änderungen gefunden."
            exit 0
          fi

          git commit -m "PoE2-Daten und PoB-Basen aktualisieren"
          git push
